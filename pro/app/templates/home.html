{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gautamsih World</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* =========================
   Attractive Navbar
========================= */

.navbar{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:95%;
    max-width:1200px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:15px 25px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;

    box-shadow:
        0 8px 30px rgba(0,0,0,0.25),
        0 0 20px rgba(255,255,255,0.08);

    z-index:1000;
}

.logo{
    font-size:1.7rem;
    font-weight:700;

    background:linear-gradient(
        90deg,
        #facc15,
        #fb7185,
        #60a5fa
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.nav-menu{
    display:flex;
    gap:15px;
}

.nav-btn{
    text-decoration:none;
    color:white;
    font-weight:600;
    padding:12px 20px;
    border-radius:12px;
    transition:all .3s ease;
}

.home-btn{
    background:linear-gradient(
        135deg,
        #06b6d4,
        #3b82f6
    );
}

.upload-btn{
    background:linear-gradient(
        135deg,
        #f97316,
        #ef4444
    );
}

.nav-btn:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* =========================
   Body
========================= */

body{
    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
    padding-top:120px;

    background:linear-gradient(
        -45deg,
        #0f172a,
        #1e3a8a,
        #6d28d9,
        #2563eb
    );

    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

.container{
    text-align:center;
    z-index:10;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
}

.container p{
    color:white;
    font-size:2rem;
    font-weight:bold;

    text-shadow:
        0 0 10px rgba(255,255,255,.6),
        0 0 20px rgba(255,255,255,.3);
}

.main-image{
    width:100%;
    max-width:450px;
    height:auto;

    border-radius:20px;

    box-shadow:
        0 0 30px rgba(255,255,255,.25);

    animation:float 4s ease-in-out infinite;
}

/* =========================
   Particles
========================= */

.particle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.25);
    animation:moveParticle 10s linear infinite;
}

.p1{
    width:20px;
    height:20px;
    left:10%;
}

.p2{
    width:30px;
    height:30px;
    left:30%;
    animation-duration:12s;
}

.p3{
    width:15px;
    height:15px;
    left:60%;
    animation-duration:8s;
}

.p4{
    width:25px;
    height:25px;
    left:80%;
    animation-duration:15s;
}

/* =========================
   Animations
========================= */

@keyframes bgMove{
    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-15px);
    }
}

@keyframes moveParticle{
    from{
        bottom:-50px;
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        bottom:110%;
        opacity:0;
    }
}

/* =========================
   Tablet
========================= */

@media(max-width:768px){

    .navbar{
        padding:12px;
    }

    .logo{
        font-size:1.1rem;
    }

    .nav-menu{
        gap:8px;
    }

    .nav-btn{
        padding:10px 12px;
        font-size:.85rem;
    }

    .container p{
        font-size:1.5rem;
    }

    .main-image{
        max-width:320px;
    }
}

/* =========================
   Mobile
========================= */

@media(max-width:480px){

    .navbar{
        flex-direction:column;
        gap:10px;
    }

    .logo{
        font-size:1rem;
    }

    .nav-btn{
        padding:8px 10px;
        font-size:.8rem;
    }

    .container p{
        font-size:1.2rem;
    }

    .main-image{
        max-width:220px;
    }

    body{
        padding-top:140px;
    }
}
</style>

</head>

<body>

<nav class="navbar">

```
<div class="logo">
    📸 Gautamsih 
</div>

<div class="nav-menu">
    <a href="{% url 'home' %}" class="nav-btn home-btn">
        🏠 Home
    </a>

    <a href="{% url 'upload' %}" class="nav-btn upload-btn">
        📸 Add Photos
    </a>
</div>
```

</nav>

<div class="container">

```
<p>ॐ श्री गणेशाय नमः</p>

<img
    src="{% static 'g.jpeg' %}"
    alt="Ganesh"
    class="main-image"
>
```

</div>

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To Gautamsih World</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#6d28d9,#2563eb);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

.container{
    text-align:center;
    z-index:10;
}

h1{
    color:white;
    font-size:5rem;
    text-transform:uppercase;
    letter-spacing:5px;
    animation:glow 2s ease-in-out infinite alternate;
}

p{
    color:white;
    font-size:1.7rem;
    margin-top:15px;
    animation:fadeIn 3s forwards;
}

/* Anime Images */
.anime{
    position:absolute;
    width:220px;
    animation:float 5s ease-in-out infinite;
    filter:drop-shadow(0 0 20px rgba(255,255,255,0.4));
}

.anime1{
    top:5%;
    left:3%;
}

.anime2{
    top:10%;
    right:3%;
    animation-delay:1s;
}

.anime3{
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:280px;
    animation-delay:2s;
}

/* Floating particles */
.particle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    animation:moveParticle 10s linear infinite;
}

.p1{
    width:20px;
    height:20px;
    left:10%;
}

.p2{
    width:30px;
    height:30px;
    left:30%;
    animation-duration:12s;
}

.p3{
    width:15px;
    height:15px;
    left:60%;
    animation-duration:8s;
}

.p4{
    width:25px;
    height:25px;
    left:80%;
    animation-duration:15s;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px #00e5ff,
        0 0 20px #00e5ff,
        0 0 40px #00e5ff;
    }
    to{
        text-shadow:
        0 0 20px #ff00ff,
        0 0 40px #ff00ff,
        0 0 80px #ff00ff;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-25px);
    }
}

@keyframes moveParticle{
    from{
        bottom:-50px;
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        bottom:110%;
        opacity:0;
    }
}

@media(max-width:768px){

    h1{
        font-size:2.8rem;
    }

    p{
        font-size:1.2rem;
    }

    .anime{
        width:120px;
    }

    .anime3{
        width:180px;
    }
}
</style>
</head>
<body>

<!-- Anime Characters -->
<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="anime anime1">
<img src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png" class="anime anime2">
<img src="https://cdn-icons-png.flaticon.com/512/4140/4140037.png" class="anime anime3">

<!-- Particles -->
<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>

<div class="container">
    <h1>WELCOME</h1>
    <p>🚀 Welcome To Gautamsih World 🚀</p>
</div>

</body>
</html>

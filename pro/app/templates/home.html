
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To Gautamsih World</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#6d28d9,#2563eb);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    padding:20px;
}

.container{
    text-align:center;
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
}

.container p{
    color:white;
    font-size:2rem;
    font-weight:bold;
    text-shadow:0 0 10px rgba(255,255,255,0.5);
}

.main-image{
    width:100%;
    max-width:450px;
    height:auto;
    border-radius:20px;
    box-shadow:0 0 25px rgba(255,255,255,0.3);
    animation:float 4s ease-in-out infinite;
}

/* Floating particles */
.particle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    animation:moveParticle 10s linear infinite;
}

.p1{
    width:20px;
    height:20px;
    left:10%;
}

.p2{
    width:30px;
    height:30px;
    left:30%;
    animation-duration:12s;
}

.p3{
    width:15px;
    height:15px;
    left:60%;
    animation-duration:8s;
}

.p4{
    width:25px;
    height:25px;
    left:80%;
    animation-duration:15s;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

@keyframes moveParticle{
    from{
        bottom:-50px;
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        bottom:110%;
        opacity:0;
    }
}

/* Tablet */
@media (max-width:768px){

    .container p{
        font-size:1.5rem;
    }

    .main-image{
        max-width:300px;
    }
}

/* Mobile */
@media (max-width:480px){

    .container p{
        font-size:1.2rem;
    }

    .main-image{
        max-width:220px;
    }

    body{
        padding:10px;
    }
}
</style>
</head>
<body>

<div class="container">
    <p>ॐ श्री गणेशाय नमः</p>

    <img src="{% static 'g.jpeg' %}"
         alt="Ganesh"
         class="main-image">
</div>

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>

</body>
</html>
